name: Publish to PyPI

# Se dispara al publicar una Release en GitHub (o a mano desde la pestaña
# Actions). Publica en PyPI vía Trusted Publishing (OIDC, sin tokens).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun run build

      - name: Copy frontend into package
        run: |
          rm -rf src/cognits/frontend_dist
          cp -r frontend/dist src/cognits/frontend_dist

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          uv sync
          uv run pytest -q

      - name: Build wheel and sdist
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Imprescindible para Trusted Publishing (OIDC).
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: astral-sh/setup-uv@v5

      - name: Publish to PyPI
        run: uv publish
