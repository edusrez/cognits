name: Publish to PyPI

on:
  push:
    tags:
      - v*

jobs:
  test:
    name: Tests (backend + frontend)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv python install 3.13

      - run: COGNITS_DISABLE_RAG=1 uv run python -m pytest -q

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - run: bun install --frozen-lockfile
        working-directory: frontend

      - run: bun run typecheck
        working-directory: frontend

      - run: bun run test
        working-directory: frontend

  publish:
    needs: [test]
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv python install 3.13

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - run: bun install --frozen-lockfile
        working-directory: frontend

      - run: bun run typecheck
        working-directory: frontend

      - run: bun run build
        working-directory: frontend

      - run: |
          rm -rf src/cognits/frontend_dist
          cp -r frontend/dist src/cognits/frontend_dist

      - run: uv build

      - run: uv publish
